name: cron-nlm

on:
  schedule:
    - cron: '0 4 1 * *'  # 1st of month, 04:00 UTC
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  nlm-import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Fetch NLM catalogue
        run: bash scripts/fetch-source-data.sh nlm
      - name: Import NLM
        shell: bash
        run: |
          set -o pipefail
          node scripts/import-nlm.mjs 2>&1 | tee /tmp/run.log
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cron-nlm-${{ github.run_id }}.log
          path: /tmp/run.log
          retention-days: 14
      - name: Mark automation_runs failed
        if: failure()
        run: node scripts/notify-cron-failure.mjs import_nlm "GitHub Actions ${{ github.workflow }} failed (run ${{ github.run_id }})"
