name: cron-recompute

on:
  schedule:
    - cron: '0 14 1 * *'  # 1st of month, 14:00 UTC (after all source imports settle)
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  recompute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Recompute trust/risk scores
        shell: bash
        run: |
          set -o pipefail
          node scripts/recompute-scores.mjs 2>&1 | tee /tmp/run.log
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cron-recompute-${{ github.run_id }}.log
          path: /tmp/run.log
          retention-days: 14
      - name: Mark automation_runs failed
        if: failure()
        run: node scripts/notify-cron-failure.mjs recompute_scores "GitHub Actions ${{ github.workflow }} failed (run ${{ github.run_id }})"
